<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snap-start</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
  </div>

  <img id="bg" class="bg" src="" alt="" />
  <div class="bg-overlay"></div>

  <div id="error" class="error hidden">
    <div class="error-card">
      <p>图片加载失败，请检查网络或 API key。</p>
      <button id="retry-btn" class="btn-primary">重试</button>
    </div>
  </div>

  <main class="app">
    <header class="top-bar">
      <div class="controls">
        <button id="pin-btn" class="icon-btn" title="钉住当前图片">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2.87 2.87 0 0 1 1.35-3.83 2.93 2.93 0 0 0 1.65-2.92V3h-3.5v1.01A2.93 2.93 0 0 0 8.15 7a2.87 2.87 0 0 1 1.35 3.83L7 17h10l-2.5-6.17a2.87 2.87 0 0 1 1.35-3.83 2.93 2.93 0 0 0 1.65-2.92V3H12v.01"/></svg>
        </button>
        <button id="refresh-btn" class="icon-btn" title="换一张">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>
        </button>
      </div>
    </header>

    <div class="search-wrap">
      <div class="clock" id="clock">
        <div class="flip-row" id="clock-time">
          <div class="flip-group"><div class="flip-digit">0</div></div>
          <div class="flip-group"><div class="flip-digit">0</div></div>
          <span class="flip-sep">:</span>
          <div class="flip-group"><div class="flip-digit">0</div></div>
          <div class="flip-group"><div class="flip-digit">0</div></div>
          <span class="flip-sep">:</span>
          <div class="flip-group"><div class="flip-digit">0</div></div>
          <div class="flip-group"><div class="flip-digit">0</div></div>
        </div>
        <div class="date" id="clock-date">星期几 1月1日</div>
      </div>
      <div class="search-engine-tabs" id="search-engine">
        <button data-engine="google" class="active">Google</button>
        <button data-engine="bing">Bing</button>
        <button data-engine="baidu">百度</button>
        <button data-engine="duckduckgo">DuckDuckGo</button>
        <div class="engine-indicator"></div>
      </div>
      <form class="search-form" id="search-form" autocomplete="off">
        <input id="search-input" type="text" placeholder="输入关键词搜索..." autofocus />
        <button type="submit" class="icon-btn" title="搜索" aria-label="搜索">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </form>
      <div class="quote" id="quote"></div>
    </div>

    <button id="info-toggle" class="info-toggle" title="展开图片信息" aria-label="展开图片信息">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    </button>

    <footer id="info-bar" class="info-bar hidden">
      <div class="info-content">
        <div class="info-left">
          <a id="info-link" href="#" target="_blank" rel="noopener" class="link">在 Pixabay 查看原图</a>
          <span id="info-user" class="photographer"></span>
        </div>
        <div id="info-tags" class="info-tags"></div>
      </div>
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
